server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vdt_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

superset:
  url: ${SUPERSET_BASE_URL:http://localhost:8088}
  username: ${SUPERSET_ADMIN_USERNAME:admin}
  password: ${SUPERSET_ADMIN_PASSWORD:admin}
  automation-worker-url: ${AUTOMATION_WORKER_URL:http://python-worker:8000}

groq:
  api:
    url: "https://api.groq.com/openai/v1/chat/completions"
    key: ${GROQ_API_KEY:your-key}

jwt:
  secret: ${JWT_SECRET_KEY:ThisIsASecretKeyForJWTAuthenticationInVDTDataPlatformMustBeAtLeast32BytesLong}
  expirationMs: 86400000
